<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lake Place HOA — Payments</title>
  <meta name="description" content="Lake Place HOA payment options." />
  <style>
    :root{
      --bg:#f3f6fa;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#475569;
      --border:#e5e7eb;
      --blue:#1d4ed8;
      --green:#16a34a;
      --ring: rgba(147,197,253,.85);
      --shadow: 0 12px 28px rgba(0,0,0,.10);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background:
  linear-gradient(rgba(243,246,250,.65), rgba(243,246,250,.65)),
  url("/assets/lake-bg.png");
background-size: cover;
background-position: center;
background-attachment: fixed;
      color: var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 28px 16px;
    }
    .wrap{width:min(760px, 100%)}
    .panel{
      background: var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      box-shadow: var(--shadow);
      padding: 22px;
    }
    h1{margin:0;font-size:28px;letter-spacing:-.2px}
    p{margin:8px 0 0;color:var(--muted);line-height:1.5}
    .grid{
      display:grid;
      gap:12px;
      margin-top:18px;
    }
    @media(min-width:720px){
      .grid{grid-template-columns: 1fr 1fr;}
    }
    a.btn{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:14px 16px;
      border-radius:16px;
      text-decoration:none;
      color:white;
      font-weight:800;
      box-shadow: 0 10px 18px rgba(0,0,0,.12);
      transition: transform .06s ease, opacity .15s ease, box-shadow .15s ease;
    }
    a.btn:hover{opacity:.96}
    a.btn:active{transform: translateY(1px)}
    a.btn:focus{outline:none}
    a.btn:focus-visible{box-shadow: 0 0 0 4px var(--ring), 0 10px 18px rgba(0,0,0,.16)}
    .blue{background:var(--blue)}
    .green{background:var(--green)}
    small{opacity:.92;font-weight:700}
    .footer{
      margin-top:14px;
      font-size:12.5px;
      color:var(--muted);
      display:flex;
      justify-content:space-between;
      gap:10px;
    }
    .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <h1>Payments</h1>
      <p>Select the payment type below. You will be redirected to Stripe’s secure checkout.</p>

      <div class="grid" aria-label="Payment choices">
        <a class="btn blue" href="/dues/" aria-label="Pay HOA dues">
          <span>Pay HOA Dues<br><small>Regular dues payments</small></span>
          <span>→</span>
        </a>

        <a class="btn green" href="/special-assessment/" aria-label="Pay special assessment">
          <span>Special Assessment<br><small>Decks &amp; Railings</small></span>
          <span>→</span>
        </a>
      </div>

      <div class="footer">
        <div>© <span id="yr"></span> Lake Place HOA</div>
        
      </div>
    </section>
  </main>

  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();
  </script>
</body>
</html>
